name: Android Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Create webDir placeholder
        # capacitor.config.ts sets webDir:'out' but app uses server.url (live Vercel).
        # Capacitor sync still requires webDir to exist — create a minimal placeholder.
        run: |
          mkdir -p out
          echo '<!DOCTYPE html><html><body>School OS</body></html>' > out/index.html

      - name: Initialize Capacitor Android platform
        run: npx cap add android || echo "Android platform already exists"

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Set version from tag
        run: |
          TAG=${GITHUB_REF_NAME:-v1.0.0}
          VERSION=${TAG#v}
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          # Patch versionName in build.gradle if present
          if grep -q 'versionName' android/app/build.gradle 2>/dev/null; then
            sed -i "s/versionName \"[^\"]*\"/versionName \"$VERSION\"/" android/app/build.gradle
          fi

      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "Warning: KEYSTORE_BASE64 secret is not set. Skipping release signing."
            echo "SIGN_RELEASE=false" >> $GITHUB_ENV
          else
            echo "$KEYSTORE_BASE64" | base64 --decode > android/app/release.keystore
            echo "SIGN_RELEASE=true" >> $GITHUB_ENV
          fi

      - name: Make Gradle wrapper executable
        working-directory: android
        run: chmod +x gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Build Release Bundle (AAB) & APK (Signed)
        if: env.SIGN_RELEASE == 'true'
        working-directory: android
        env:
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=release.keystore \
            -Pandroid.injected.signing.store.password="$STORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD" \
            --no-daemon
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=release.keystore \
            -Pandroid.injected.signing.store.password="$STORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD" \
            --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: EdProSys-${{ env.VERSION || 'debug' }}-debug.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload Release AAB
        if: env.SIGN_RELEASE == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: EdProSys-${{ env.VERSION || 'release' }}.aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Upload Release APK
        if: env.SIGN_RELEASE == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: EdProSys-${{ env.VERSION || 'release' }}-signed.apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/') && env.SIGN_RELEASE == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            android/app/build/outputs/bundle/release/app-release.aab
            android/app/build/outputs/apk/release/app-release.apk
            android/app/build/outputs/apk/debug/app-debug.apk
          name: EdProSys ${{ github.ref_name }}
          body: |
            ## EdProSys ${{ github.ref_name }}
            Android Builds — Production Release.
            **Install APK:** Download the signed release APK → enable "Install from unknown sources" → install.
            **Play Store:** Use the uploaded `.aab` file for Play Console deployment.
            **Requires:** Android 7.0+ (API 24+)
            **Loads:** https://www.edprosys.com
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
