<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EdProSys — Offline</title>
  <style>
    body { font-family: system-ui, sans-serif; display: flex;
      align-items: center; justify-content: center;
      min-height: 100vh; margin: 0; background: #f0f4ff; color: #1e40af; }
    .card { text-align: center; padding: 2rem; max-width: 360px; }
    .icon { font-size: 4rem; margin-bottom: 1rem; }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    p { color: #64748b; font-size: 0.9rem; line-height: 1.6; }
    button { margin-top: 1.5rem; padding: 0.75rem 2rem;
      background: #1e40af; color: white; border: none;
      border-radius: 8px; font-size: 1rem; cursor: pointer; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <h1>You're offline</h1>
    <p>EdProSys needs an internet connection to load.
       Please check your connection and try again.</p>
    <button onclick="window.location.reload()">Try Again</button>
  </div>
</body>
</html>
